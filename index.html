<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Proxy Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">Proxy</div>

    <button class="nav active" data-page="setup">
      <img src="./assets/icons/icon-setup.svg" width="16" height="16" />
      Setup
    </button>

    <button class="nav" data-page="servers">
      <img src="./assets/icons/icon-servers.svg" width="16" height="16" />
      Мои серверы
    </button>
  </div>

  <div class="content">
    <div id="setup" class="page active">

      <div class="card connect-card">
        <h2>Подключение</h2>
        <div class="form">
          <input id="ip"       placeholder="IP адрес" />
          <input id="login"    placeholder="Логин" />
          <input id="pass"     type="password" placeholder="Пароль" />
          <div class="spacer"></div>
          <button id="btn-setup" class="btn primary">Настроить</button>
        </div>
      </div>

      <div class="card">
        <h2>Статус</h2>
        <div class="status">
          <span class="dot" id="dot"></span>
          <span id="status-text">Ожидание...</span>
        </div>
        <progress id="progress" value="0" max="1"></progress>
      </div>

      <div class="card log-card">
        <h2>Логи</h2>
        <pre id="log"></pre>
      </div>

    </div>

    <div id="servers" class="page">
      <div class="servers-list" id="servers-list"></div>
    </div>

  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
