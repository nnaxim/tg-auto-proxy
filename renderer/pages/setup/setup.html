<div class="page">

  <div class="card connect-card">

    <div class="connect-top">
      <h2>Подключение</h2>
      <div class="form">
        <input id="ip" placeholder="IP адрес" />
        <input id="login" placeholder="Логин" />
        <input id="pass" type="password" placeholder="Пароль" />
      </div>
    </div>

    <div class="connect-bottom">
        <div class="divider" id="divider" style="display:none"></div>

        <div class="status-row" id="status-row" style="display:none">
            <span class="dot" id="dot"></span>
            <span id="status-text">Ожидание...</span>
        </div>

        <pre id="log" style="display:none"></pre>

        <button id="btn-setup" class="btn primary">Настроить</button>
    </div>

  </div>

</div>
